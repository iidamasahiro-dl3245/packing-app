<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="持ち物">
<meta name="theme-color" content="#214436">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>持ち物マネージャー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#EEF1EC;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif}
.wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px}
.card{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.icon{text-align:center;font-size:48px;margin-bottom:16px}
h1{text-align:center;font-size:20px;font-weight:800;color:#1a2e27;margin-bottom:6px}
p{text-align:center;font-size:13px;color:#7a8c82;margin-bottom:24px}
input[type=password]{
  display:block;width:100%;padding:16px;
  border:1.5px solid #d0dbd5;border-radius:12px;
  font-size:20px;letter-spacing:6px;text-align:center;
  outline:none;color:#1a2e27;background:#f5f8f6;
}
input[type=password]:focus{border-color:#214436;background:#fff}
.err{color:#c0392b;font-size:13px;text-align:center;margin-top:10px;min-height:20px}
button{
  display:block;width:100%;margin-top:16px;padding:15px;
  background:#214436;color:#fff;border:none;border-radius:12px;
  font-size:16px;font-weight:700;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
button:active{background:#163025}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="icon">🧳</div>
    <h1>持ち物マネージャー</h1>
    <p>パスワードを入力してください</p>
    <input id="pw" type="password" inputmode="numeric" pattern="[0-9]*"
           maxlength="10" placeholder="••••••"
           onkeydown="if(event.key==='Enter')check()">
    <div id="err" class="err"></div>
    <button onclick="check()">入力</button>
  </div>
</div>
<script>
(function(){
  var K='pa',A=atob('NjU5Mjc1');
  if(sessionStorage.getItem(K)===A){ location.replace('./app.html'); }
  function check(){
    var v=document.getElementById('pw').value;
    if(v===A){
      sessionStorage.setItem(K,A);
      location.replace('./app.html');
    } else {
      document.getElementById('err').textContent='パスワードが違います';
      document.getElementById('pw').value='';
      document.getElementById('pw').focus();
    }
  }
  window.check=check;
})();
</script>
</body>
</html>
